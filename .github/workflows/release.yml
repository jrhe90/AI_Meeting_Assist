name: Release

# Fires on any annotated tag of the form v1.2.3. Skips builds on branch
# pushes — this workflow is for cutting actual releases, not running tests.
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    name: Build, notarize, publish
    # macos-26 is the GitHub-hosted runner that matches our minimum
    # deployment target. Bump if Apple removes it.
    runs-on: macos-26

    permissions:
      contents: write   # needed to upload assets to the GitHub Release

    env:
      DEV_TEAM_ID: ${{ secrets.DEV_TEAM_ID }}
      APP_BUNDLE_ID: com.ainotetaker.app
      # APP_VERSION is derived from the pushed tag (strip leading 'v').
      APP_VERSION: ${{ github.ref_name }}

      # notarytool credentials. Use an App Store Connect API key (recommended)
      # by storing it as a base64-encoded .p8 in NOTARY_KEY_P8_BASE64.
      NOTARY_KEY_ID: ${{ secrets.NOTARY_KEY_ID }}
      NOTARY_ISSUER_ID: ${{ secrets.NOTARY_ISSUER_ID }}
      NOTARY_KEY_P8_BASE64: ${{ secrets.NOTARY_KEY_P8_BASE64 }}

      # Developer ID Application certificate, exported as a .p12 from Keychain
      # Access and base64-encoded for the secret. KEYCHAIN_PASSWORD secures the
      # ephemeral keychain we create on the runner.
      SIGNING_CERT_P12_BASE64: ${{ secrets.SIGNING_CERT_P12_BASE64 }}
      SIGNING_CERT_PASSWORD: ${{ secrets.SIGNING_CERT_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Strip leading 'v' from version
        run: |
          echo "APP_VERSION=${APP_VERSION#v}" >> "$GITHUB_ENV"

      - name: Install build tools
        run: |
          brew update
          brew install xcodegen create-dmg cmake

      - name: Build whisper.cpp xcframework
        run: |
          cd Vendor/whisper.cpp
          bash build-xcframework.sh

      - name: Create temporary keychain and import signing cert
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$SIGNING_CERT_P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" \
            -P "$SIGNING_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d \")
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm "$RUNNER_TEMP/cert.p12"

      - name: Store notarytool credentials
        run: |
          echo "$NOTARY_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
          xcrun notarytool store-credentials ainotetaker-release \
            --key "$RUNNER_TEMP/AuthKey.p8" \
            --key-id "$NOTARY_KEY_ID" \
            --issuer "$NOTARY_ISSUER_ID"
          rm "$RUNNER_TEMP/AuthKey.p8"

      - name: Build, notarize, and bundle DMG
        env:
          NOTARY_PROFILE: ainotetaker-release
        run: |
          ./scripts/build-dmg.sh

      - name: Upload DMG to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/dist/AINoteTaker-${{ env.APP_VERSION }}.dmg
          generate_release_notes: true
          draft: true
